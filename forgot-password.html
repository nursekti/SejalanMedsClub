<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lupa Password | Sejalan Meds Club</title>
  <link rel="stylesheet" href="css/auth.css">
  <style>
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #5c6bc0;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: #1a237e;
    }
    .success-message {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }
    .success-message.show {
      display: block;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .info-text {
      font-size: 14px;
      color: #5c6bc0;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    #resetForm {
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: left;
    }
    #resetError {
      color: #e91e63;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
    }
    .loading-btn {
      position: relative;
      pointer-events: none;
      opacity: 0.8;
    }
    .loading-btn::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <a href="login.html" class="back-link">← Kembali ke Login</a>
    
    <h2>🔑 Lupa Password</h2>
    
    <div id="successMessage" class="success-message">
      <strong>✓ Email terkirim!</strong><br>
      Silakan cek inbox email Anda untuk link reset password.
    </div>
    
    <p class="info-text">
      Masukkan email yang terdaftar. Kami akan mengirimkan link untuk mengatur ulang password Anda.
    </p>

    <form id="resetForm">
      <label>Email</label>
      <input type="email" id="resetEmail" placeholder="Masukkan email Anda" required>

      <button type="submit" id="resetBtn">Kirim Link Reset Password</button>
    </form>

    <p id="resetError"></p>
  </div>

  <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
